{% extends "layout.html" %}

{% block title %}
    Price Quote Result
{% endblock %}

{% block main %}

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div></div>
                <h2 class="mb-3">Price Quote</h2>
                <hr>
                <div class="card p-4 text-bg-light">
                    <table class="table table-striped mb-3">
                        <thead>
                            <tr>
                                <th>Symbol</th>
                                <th>Name</th>
                                <th>Price/Share</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>{{ symbol }}</td>
                                <td>{{ name }}</td>
                                <td>{{ price | usd }}</td>
                            </tr>
                        </tbody>
                    </table>
                    <div class="d-flex justify-content-end" style="gap:5px">
                        <a href="{{ url_for('quote') }}" class="btn btn-secondary w-25">Back</a>
                        <a href=" {{ url_for('buy', symbol=symbol)}}" class="btn btn-primary w-25">Purchase</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </div>

{% endblock %}
