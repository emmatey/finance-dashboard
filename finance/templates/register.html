{% extends "layout.html" %}

{% block title %}
    Register
{% endblock %}

{% block main %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-4 text-bg-light mb-3">
                <form action="/register" method="POST" name="registerForm">
                    <h3 class="fw-bold">Sign Up</h3>
                    <hr>
                    <div class="mb-3">
                        <h6 class="fw-bold">Username</h6>
                        <input type="text" required autofocus minlength="1" name="username" class="form-control">
                    </div>
                    <div>
                        <h6 class="fw-bold">Password</h6>
                        <input type="password" required minlength="1" name="password" class="form-control mb-1" placeholder="Password...">
                        <input type="password" required minlength="1" name="confirmation" class="form-control" placeholder="Re-enter to Confirm...">
                        <div id="passwordHelpBlock" class="form-text mb-3">
                            Your password must be at least 1 character long. Enter your password in both boxes to confirm. If they match, you will be registered.
                        </div>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary"> Register </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script>
    const form = document.getElementsByName("registerForm")[0];
    form.addEventListener("submit", (event) => {
        event.preventDefault();
        const registerPw = document.getElementsByName("password")[0];
        const registerPwConfirm = document.getElementsByName("confirmation")[0];
        if (registerPw.value != registerPwConfirm.value) {
            alert("Your two password values do not match, please try again.");
            registerPw.value = "";
            registerPwConfirm.value = "";
        } else {
            form.submit()
        };
    })
</script>
{% endblock %}
