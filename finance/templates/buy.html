{% extends "layout.html" %}

{% block title %}
    Buy stocks
{% endblock %}

{% block main %}

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <h3 class="mb-3">Purchase Stocks.</h3>
            <hr>
            <div class="card p-4 text-bg-light mb-3">
                <div class="mb-4">
                    <span class="fs-4">Account Balance: </span>
                    <span class="badge rounded-pill fs-6" name="balance">{{ balance_formatted }}</span>
                    <script>
                        const balanceSpan = document.getElementsByName("balance")[0];
                        const balanceValue = {{ balance_raw }};
                        if (balanceValue < 1000) {
                            balanceSpan.classList.add("text-bg-danger");
                        } else if (balanceValue >= 1000 && balanceValue < 5000) {
                            balanceSpan.classList.add("text-bg-warning");
                        } else if (balanceValue >= 5000) {
                            balanceSpan.classList.add("text-bg-success");
                        };
                    </script>
                </div>
                <form action="/buy" method="POST">
                    <div class="input-group">
                        <span class="input-group-text">Symbol</span>
                        <input type="text" class="form-control" name="symbol" value="{{ symbol }}"required>

                        <span class="input-group-text">Qty.</span>
                        <input name="shares" type="number" class="form-control" min="0" required>

                        <button class="btn btn-primary" type="submit">Buy</button>
                    </div>
                    <div id="symbolHelp" class="form-text">Enter the stock symbol you want to buy.</div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
